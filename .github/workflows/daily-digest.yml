name: Daily Science Digest

on:
  schedule:
    # Runs at 07:00 UTC daily — adjust for your preferred local send time.
    # Sri Lanka is UTC+5:30, so 07:00 UTC = 12:30 PM Sri Lanka time.
    - cron: "0 7 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab to test

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run digest bot
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python digest_bot.py
